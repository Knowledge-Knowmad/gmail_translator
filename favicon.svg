<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="32" cy="28" r="14" fill="none" stroke="url(#globe)" stroke-width="2.2"/>
  <ellipse cx="32" cy="28" rx="7" ry="14" fill="none" stroke="url(#globe)" stroke-width="1.8"/>
  <line x1="18" y1="28" x2="46" y2="28" stroke="url(#globe)" stroke-width="1.8"/>
  <line x1="21" y1="20" x2="43" y2="20" stroke="url(#globe)" stroke-width="1.2"/>
  <line x1="21" y1="36" x2="43" y2="36" stroke="url(#globe)" stroke-width="1.2"/>
  <!-- 中 character -->
  <text x="32" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="800" fill="#ffffff" opacity="0.95">中</text>
</svg>
