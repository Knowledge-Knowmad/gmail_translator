<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 300px; font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { font-size: 16px; color: #00d2ff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
h1::before { content: '🌐'; font-size: 20px; }
p { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 16px; }
.status { background: #16213e; border-radius: 8px; padding: 12px; font-size: 13px; border-left: 3px solid #00d2ff; }
.status span { color: #4ade80; font-weight: bold; }
.tip { margin-top: 12px; font-size: 11px; color: #666; }
</style>
</head>
<body>
  <h1>Gmail 一鍵翻譯</h1>
  <p>開啟任何 Gmail 英文信件，點擊右上角的「<strong style="color:#00d2ff">翻譯成中文</strong>」按鈕即可翻譯。</p>
  <div class="status">狀態：<span>已啟用</span></div>
  <p class="tip">💡 翻譯結果會直接顯示在原文下方，再點一次可切換回原文。</p>
</body>
</html>
